<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Edit Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3>Edit Employee</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/employees/{id}(id=${employee.id})}"
                  th:object="${employee}"
                  method="post">

                <input type="hidden"
                       th:field="*{id}">

                <div class="mb-3">

                    <label>First Name</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{firstName}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Last Name</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{lastName}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input type="email"
                           class="form-control"
                           th:field="*{email}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Department</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{department}">

                </div>

                <div class="mb-3">

                    <label>Salary</label>

                    <input type="number"
                           class="form-control"
                           th:field="*{salary}">

                </div>

                <button class="btn btn-success">

                    Update Employee

                </button>

                <a th:href="@{/}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
