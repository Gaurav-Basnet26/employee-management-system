<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Add Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Add Employee</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/employees}"
                  th:object="${employee}"
                  method="post">

                <div class="mb-3">

                    <label class="form-label">
                        First Name
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{firstName}"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Last Name
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{lastName}"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input type="email"
                           class="form-control"
                           th:field="*{email}"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Department
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{department}">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Salary
                    </label>

                    <input type="number"
                           class="form-control"
                           th:field="*{salary}">

                </div>

                <button class="btn btn-success"
                        type="submit">

                    Save Employee

                </button>

                <a th:href="@{/}"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
